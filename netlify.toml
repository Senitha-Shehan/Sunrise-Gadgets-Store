# Netlify Configuration for Sunrise Gadgets Store
# Build and deployment settings for the frontend

[build]
  # Set base directory to frontend folder
  base = "frontend"
  
  # Build command (runs from frontend directory)
  command = "npm run build"
  
  # Directory to deploy (relative to base, Vite outputs to dist/)
  publish = "dist"

# Environment variables for build (can also be set in Netlify UI)
[env]
  VITE_API_URL = "https://your-backend-api-url.com"
  # Replace with your actual backend URL

# SPA routing - redirect all requests to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# API proxy to backend (alternative to VITE_API_URL)
# Uncomment if you want Netlify to proxy API requests
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url/api/:splat"
#   status = 200
#   force = true

# Pre-production deployment context
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

# Production deployment context  
[context.production]
  command = "npm run build"
  publish = "dist"

# Development/staging context
[context.staging]
  command = "npm run build"
  publish = "dist"
